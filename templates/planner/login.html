{% load static %} <!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Quanta</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link href="{% static 'assets/style.css' %}" rel="stylesheet" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="card auth-card">
        <div class="card-body p-4 p-md-5">
          <div class="text-center mb-4">
            <img src="{% static 'images/logo.svg' %}" width="86" class="mb-3" />
            <h1 class="h3 mb-1">Team Skills Planner</h1>
            <div class="small-note">Portal login</div>
          </div>
          <form method="post" class="d-grid gap-3">
            {% csrf_token %}
            <div>
              <label class="form-label">Username</label>{{ form.username }}
            </div>
            <div>
              <label class="form-label">Password</label>{{ form.password }}
            </div>
            {% if form.errors %}
            <div class="alert alert-danger mb-0">
              Invalid username or password.
            </div>
            {% endif %}<button class="btn btn-primary btn-lg" type="submit">
              Login
            </button>
          </form>
          {% comment %} <div class="login-demo mt-4">
            <div class="fw-semibold mb-2">Demo accounts</div>
            <div class="small">
              admin / admin<br />manager1 / 123456<br />lead1 / 123456<br />viewer1
              / 123456
            </div>
          </div> {% endcomment %}
        </div>
      </div>
    </div>
  </body>
</html>
