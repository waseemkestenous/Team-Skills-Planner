{% extends 'planner/base.html' %}
{% block content %}
{% include 'planner/crud/_admin_tabs.html' %}
<div class="card dashboard-card mb-4">
  <div class="card-body">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
      <div>
        <h2 class="section-title">{{ meta.title }}</h2>
        <div class="section-subtitle">{{ meta.subtitle }}</div>
      </div>
      {% if meta.create_url %}<a class="btn btn-primary" href="{{ meta.create_url }}">Add New</a>{% endif %}
    </div>
    {% block list_filters %}{% endblock %}
  </div>
</div>
<div class="card dashboard-card">
  <div class="card-body">
    {% block list_content %}{% endblock %}
  </div>
</div>
{% endblock %}
